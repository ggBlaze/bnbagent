# BNB Agent — main runtime configuration
# All values overridable via environment variables (.env).

# v2.1.8: shipped defaults flipped to mainnet. A fresh install (no
# config/local.yaml) lands on BSC mainnet, chain 56, with binance-tier
# free market data. To run a safe dry-run instead, set BNBAGENT_MODE=replay
# or copy config/local.yaml.example and edit mode/chain_id/rpcs to testnet.
mode: mainnet                              # testnet | mainnet | replay

# --- BSC chain ---
chain_id: 56                                # 56 = BSC mainnet, 97 = testnet
rpcs:
  - https://bsc-dataseed.binance.org
  - https://bsc-dataseed1.defibit.io
  - https://bsc-dataseed1.ninicoin.io
gas:
  max_gwei: 5
  swap_gas: 250000
  approve_gas: 100000

# --- Token registry (BSC-20 addresses) ---
# These are the contracts the agent will trade. Verify on Day 1 against the chain explorer.
tokens:
  WBNB:
    symbol: WBNB
    bsc_address: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c"  # native BSC WBNB
    decimals: 18
  USDC:
    symbol: USDC
    bsc_address: "0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d"  # native Circle USDC on BSC
    decimals: 18  # v2.2.4: was 6 (wrong). On-chain decimals() returns 18.
  CAKE:
    symbol: CAKE
    bsc_address: "0x0E09FaBB73Bd3Ade0a17ECC321fD13a19e81cE82"  # PancakeSwap CAKE
    decimals: 18
  BTCB:
    symbol: BTCB
    bsc_address: "0x7130d2A12B9BCbFAe4f2634d864A1Ee1Ce3Ead9c"  # Binance-Peg BTCB
    decimals: 18
  ETH:
    symbol: ETH
    bsc_address: "0x2170Ed0880ac9A755fd29B2688956BD959F933F8"  # Binance-Peg ETH
    decimals: 18
  USDT:
    symbol: USDT
    bsc_address: "0x55d398326f99059fF775485246999027B3197955"  # Tether USD on BSC
    decimals: 18  # v2.2.4: was 6 (wrong). On-chain decimals() returns 18.
  # (additional tokens loaded from allowlist.yaml)

# --- DEX routers (PancakeSwap v3, BSC mainnet) ---
# Source: https://developer.pancakeswap.finance/contracts/v3/addresses
#   - Smart Router (BSC + ETH): 0x13f4EA83D0bd40E75C8222255bc855a974568Dd4
#   - QuoterV2 (BSC):            0xB048Bbc1Ee6b733FFfCFb9e9CeF7375518e25997
#   - PancakeV3Factory (BSC):    0x0BFbCF9fa4f9C56B0F40a671Ad40E0805A091865
dex:
  pcs_v3_router:   "0x13f4EA83D0bd40E75C8222255bc855a974568Dd4"  # PCS Smart Router (BSC, multi-hop, exactInputSingle compatible, allowance is set for this)
  pcs_v3_quoter:   "0xB048Bbc1Ee6b733FFfCFb9e9CeF7375518e25997"   # PCS QuoterV2 (BSC mainnet)
  pcs_v3_factory:  "0x0BFbCF9fa4f9C56B0F40a671Ad40E0805A091865"  # PCS V3 Factory (BSC)
  default_pool_fee: 2500                    # 0.25%
  pool_fees: [100, 500, 2500, 10000]

# --- Perps venues (research on Day 1; do not commit) ---
perps:
  candidates: [aster, killex, apollox, mux]
  min_oi_usd: 100000                        # venue must have >$100k OI to be selected
  default_leverage: 1                       # spot-neutral carry
  min_funding_pct: 0.005                    # 0.005% per 8h = ~0.5% APR floor

# --- CMC Agent Hub ---
cmc:
  x402_base: https://api.coinmarketcap.com/agent-hub
  api_base:  https://pro-api.coinmarketcap.com
  api_key: ""                                # leave empty for x402-only mode
  basket_symbols: [ETH, USDC, USDT, DAI, XRP, DOGE, ADA, AVAX, LINK, DOT,
                   INJ, SHIB, LTC, BCH, ATOM, UNI, AAVE, CAKE, FIL, TUSD]
  dex_universe_symbols: [CAKE, ETH, XRP, DOGE, ADA, AVAX, LINK, DOT,
                          INJ, SHIB, LTC, BCH, ATOM, UNI, AAVE]

# Data source tier — picked in the Setup wizard
# One of: "cmc_pro" (paid), "x402" (Base USDC), "binance" (free), "mock" (replay/tests)
data_source:
  tier: "binance"                # v2.1.8: free BSC market data, no key needed
  cmc_api_key: ""                # populated by the wizard when tier == "cmc_pro"
  base_rpcs:                     # used by the x402 path for balance polling
    - https://mainnet.base.org
    - https://base.publicnode.com
    - https://1rpc.io/base
  daily_cap_usdc: 10.0           # x402 daily spend cap

# --- Sleeve tick intervals (seconds) ---
ticks:
  A: 30
  B: 300
  C: 300

# --- Logging ---
log:
  level: INFO
  json: true
  file: logs/agent.log
