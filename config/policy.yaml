global_risk:
  daily_loss_circuit_breaker_pct: 5.0    # was 3.0% — too tight, tripped after 5 bad trades
  per_trade_risk_pct: 1.0
  max_gross_leverage: 2.0
  max_single_position_pct: 15.0
  max_daily_trades: 100
  max_drawdown_pct: 8.0
  cooldown_after_breach_min: 60
  # Strategy filters (v2.0.2 — Path A)
  # If realized vol is below this annualized, Sleeve A's funding carry
  # is below transaction costs. Skip the carry rather than grinding.
  min_realized_vol_annualized: 0.05    # 5%
  # Minimum hold time (s) before the vol-pause can close a position.
  # Prevents open/close churn when realized vol oscillates around the
  # 5% threshold. Default 24h — gives a position a full funding cycle
  # to accrue meaningful carry before vol-pause can shut it down.
  low_vol_min_hold_s: 86400
  # Sleeve B (momentum) needs a confirmed 4h trend; the 1h trend is
  # optional (was required in v2.0.2, caused zero fires on the
  # synthetic tape because only 1% of ticks had all three signals).
  require_4h_trend_for_momentum: true
  require_1h_trend_for_momentum: false
sleeve_allocations:
  A: 0.7
  B: 0.2
  C: 0.1
sleeves:
  A:
    enabled: true
    venue_selection: highest_abs_funding_7d
    rebalance_hours: 8
    fund_floor_pct: 0.005
    basis_trigger_pct: 2.0    # was 0.5% — too tight for 5-min bars, caused wash exits
    max_position_pct: 15.0
  B:
    enabled: true
    volume_spike_mult: 1.5    # was 2.0 — too tight, fires 1% of ticks only
    breakout_lookback_h: 4
    atr_len: 14
    atr_stop_mult: 2.0
    tp_pct: 3.0
    max_hold_min: 240
    kelly_fraction: 0.25
    max_position_pct: 10.0
    # Vol-spike protection: if realized vol > entry_vol * vol_spike_threshold,
    # the stop is widened to entry - atr_stop_mult * current_atr, clamped to
    # a max loss of max_loss_pct on the position. Catches tail-vol events
    # where the static ATR stop is now too tight and would cause an exit
    # only on a noise tick.
    vol_spike_threshold: 1.5
    max_loss_pct: 5.0
  C:
    enabled: true
    zscore_threshold: 2.0    # was 2.5 — too tight, fires 1.1% of ticks
    stop_pct: 2.0
    target_pct: 1.0
    lookback_h: 1
    kelly_fraction: 0.25
    max_position_pct: 5.0
